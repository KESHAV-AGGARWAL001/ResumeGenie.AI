version: '3.8'

services:
  # ─── API Server ────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped

  # ─── LaTeX Compiler Image (pre-built) ─────────────────────────────
  # This service is just for building the image; it doesn't run as a daemon.
  # The API server spawns Docker containers using this image.
  latex:
    build:
      context: .
      dockerfile: Dockerfile
    image: latex-editor-custom
    entrypoint: ["echo", "LaTeX image built successfully"]
