name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Syntax check
        run: |
          find . -name '*.js' -not -path './node_modules/*' | while read f; do
            node --check "$f" || exit 1
          done

      - name: Run tests
        run: npm test
        env:
          GOOGLE_GENAI_API_KEY: test-key
          FIREBASE_PROJECT_ID: test-project

      - name: Verify no secrets in code
        run: |
          if grep -rn "sk_live\|whsec_live\|AIza" --include='*.js' --include='*.json' . --exclude-dir=node_modules; then
            echo "::error::Potential secrets found in code!"
            exit 1
          fi

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        run: npx vite build
        env:
          VITE_FIREBASE_API_KEY: dummy
          VITE_FIREBASE_AUTH_DOMAIN: dummy
          VITE_FIREBASE_PROJECT_ID: dummy
          VITE_FIREBASE_STORAGE_BUCKET: dummy
          VITE_FIREBASE_MESSAGING_SENDER_ID: dummy
          VITE_FIREBASE_APP_ID: dummy
          VITE_BACKEND_URL: http://localhost:5000
