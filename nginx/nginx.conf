worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_global:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_compile:10m rate=1r/s;

    # Upstream API servers
    upstream api_servers {
        server api:5000;
        # Add more servers here for horizontal scaling:
        # server api2:5000;
        # server api3:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Redirect HTTP to HTTPS in production (uncomment when SSL is configured)
        # return 301 https://$host$request_uri;

        # API proxy
        location /api/ {
            limit_req zone=api_global burst=20 nodelay;

            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for compilation
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # Max body size for uploads
            client_max_body_size 5m;
        }

        # Compile endpoint (stricter rate limit)
        location /api/compile {
            limit_req zone=api_compile burst=3 nodelay;

            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            client_max_body_size 1m;
        }

        # Stripe webhook (no rate limit — Stripe retries on failure)
        location /api/payments/webhook {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            proxy_pass http://api_servers;
            proxy_http_version 1.1;
        }
    }

    # HTTPS server (uncomment and configure when SSL certs are available)
    # server {
    #     listen 443 ssl http2;
    #     server_name resumegenie.ai;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     # Same location blocks as above
    # }
}
